<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Matcher</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>AI Resume Matcher</h1>

<h2>Upload Resume ZIP</h2>

<form action="/upload-zip" method="post" enctype="multipart/form-data">

    <label>Select Resume ZIP File</label>

    <input
        type="file"
        name="zip_file"
        accept=".zip"
        required
    >

    <button type="submit">
        Upload ZIP
    </button>

</form>

<hr>

<h2>Match Candidates</h2>

<form action="/match-ui" method="post">

    <textarea
        name="jd"
        rows="10"
        cols="60"
        placeholder="Paste Job Description here..."
        required
    ></textarea>

    <br><br>

    <button type="submit">
        Match
    </button>

</form>

</body>
</html>
