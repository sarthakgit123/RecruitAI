<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>
<body>

<h1>Top Candidates</h1>

{% if error %}

<p>{{ error }}</p>

{% endif %}

{% if results %}

{% for candidate in results %}

<div>

    <h3>
        {{ candidate.resume }}
    </h3>

    <p>
        Similarity:
        {{ candidate.similarity }}%
    </p>

</div>

<hr>

{% endfor %}

{% else %}

<p>No matching resumes found.</p>

{% endif %}

<a href="/">
Back to Home
</a>

</body>
</html>
